<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Enzo Sanchez Sartori</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        // Ce petit bout de code doit être en haut pour éviter le flash blanc
        if (localStorage.getItem("theme") === "light") {
            document.documentElement.classList.add("light-mode");
        }
    </script>
</head>
<body>

<nav>
    <div class="nav-container">
        <a href="index.html" class="logo">
            <img src="common/Logo_IUT.png" alt="Logo IUT" class="nav-logo-img">
            <span>PORTFOLIO GMP</span>
        </a>
        <ul>
            <li><a href="index.html" class="active">Accueil</a></li>
            <li><a href="projets.html">Projets</a></li>
            <li><a href="common/cv.pdf" target="_blank" class="btn-cv">Mon CV</a></li>
            <li><button id="theme-toggle" class="theme-btn"><i class="fa-solid fa-moon"></i></button></li>
        </ul>
    </div>
</nav>

<header class="hero">
    <div class="hero-content">
        <span class="badge">Étudiant en BUT 1</span> 
        <h1>Enzo Sanchez Sartori</h1>
        <p class="subtitle">Génie Mécanique et Productique</p>
        <div class="hero-btns">
            <a href="projets.html" class="btn-primary">Voir mes réalisations</a>
            <a href="mailto:ton.mail@exemple.com" class="btn-secondary">Me contacter</a>
        </div>
    </div>
</header>

<section class="skills-preview">
    <div class="skills-grid">
        <a href="competences.html#cao" class="skill-item">
            <i class="fa-solid fa-gear"></i> 
            <span>CAO (SolidWorks)</span>
        </a>
        <a href="competences.html#indus" class="skill-item">
            <i class="fa-solid fa-microchip"></i> 
            <span>Industrialisation</span>
        </a>
        <a href="competences.html#atelier" class="skill-item">
            <i class="fa-solid fa-hammer"></i> 
            <span>Usinage & Montage</span>
        </a>
    </div>
</section>

<script>
    const btn = document.getElementById("theme-toggle");
    const icon = btn.querySelector("i");

    // Fonction pour mettre à jour l'icône selon le thème actuel
    function updateIcon() {
        if (document.documentElement.classList.contains("light-mode")) {
            icon.classList.replace("fa-moon", "fa-sun");
        } else {
            icon.classList.replace("fa-sun", "fa-moon");
        }
    }

    updateIcon(); // Au chargement

    btn.addEventListener("click", () => {
        // On bascule la classe sur <html>
        const isLight = document.documentElement.classList.toggle("light-mode");
        
        // ON ENREGISTRE LE CHOIX ICI :
        localStorage.setItem("theme", isLight ? "light" : "dark");
        
        updateIcon();
    });
</script>

</body>
</html>
